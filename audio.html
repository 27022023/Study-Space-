<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NoteCast – Image to Audio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- OCR library -->
  <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #ffe6f2, #e6f0ff);
      --card-bg: #ffffff;
      --accent: #a78bfa;
      --accent-soft: #c7d2fe;
      --accent-soft-hover: #a5b4fc;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border: #d1d5db;
      --surface: #f9fafb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 16px;
      background: var(--bg-gradient);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      background: var(--card-bg);
      width: 100%;
      max-width: 800px;
      border-radius: 24px;
      padding: 24px 22px 26px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    header h1 {
      margin: 0;
      font-size: 1.9rem;
      color: var(--accent);
    }

    header p {
      margin: 6px 0 16px;
      color: var(--text-muted);
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--text-main);
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .file-label:hover {
      background: var(--accent-soft-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(129, 140, 248, 0.4);
    }

    .file-label input {
      display: none;
    }

    #preview {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      margin-top: 14px;
      border-radius: 16px;
      display: none;
      background: var(--surface);
    }

    #status {
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .controls-row {
      margin-top: 10px;
    }

    button {
      background: var(--accent-soft);
      border: none;
      padding: 9px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      margin: 6px 8px 0 0;
      transition: 0.2s ease;
    }

    button:hover {
      background: var(--accent-soft-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(129, 140, 248, 0.4);
    }

    #output {
      width: 100%;
      height: 200px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.9rem;
      resize: vertical;
      margin-top: 10px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    #voiceSelect {
      margin-top: 10px;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      width: 100%;
      font-size: 0.9rem;
    }

    #progressBar {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      margin-top: 12px;
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.1s linear;
    }

    .saved-section {
      margin-top: 20px;
      border-top: 1px solid #e5e7eb;
      padding-top: 14px;
    }

    .saved-section h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      color: var(--accent);
    }

    .saved-list {
      max-height: 220px;
      overflow-y: auto;
    }

    .saved-item {
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .saved-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .saved-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .saved-actions button {
      margin: 0;
      padding: 6px 12px;
      font-size: 0.8rem;
    }

    .saved-text-preview {
      font-size: 0.85rem;
      color: var(--text-main);
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px 16px 22px;
      }

      header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>NoteCast</h1>
      <p>Upload your notes and listen like a podcast.</p>
    </header>

    <label class="file-label">
      <span>Choose note image</span>
      <input type="file" id="imageInput" accept="image/*" />
    </label>

    <img id="preview" alt="Preview" />
    <p id="status">No image selected.</p>

    <div class="controls-row">
      <button id="extractBtn">Extract Text</button>
    </div>

    <textarea id="output" placeholder="Extracted text will appear here..."></textarea>

    <select id="voiceSelect"></select>

    <div id="progressBar"><div id="progressFill"></div></div>

    <div class="controls-row">
      <button id="playBtn">Play Audio</button>
      <button id="stopBtn">Stop</button>
    </div>

    <div class="saved-section">
      <h2>Saved podcasts</h2>
      <div class="saved-list" id="savedList"></div>
    </div>
  </div>

  <script>
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const statusEl = document.getElementById("status");
    const output = document.getElementById("output");
    const extractBtn = document.getElementById("extractBtn");
    const playBtn = document.getElementById("playBtn");
    const stopBtn = document.getElementById("stopBtn");
    const voiceSelect = document.getElementById("voiceSelect");
    const progressFill = document.getElementById("progressFill");
    const savedList = document.getElementById("savedList");

    const STORAGE_KEY = "notecast_podcasts_v1";

    let currentFile = null;
    let utterance = null;
    let voices = [];
    let podcasts = [];
    let currentLang = "auto";

    function loadVoices() {
      voices = window.speechSynthesis.getVoices();
      populateVoiceSelect();
    }

    function populateVoiceSelect(langHint) {
      voiceSelect.innerHTML = "";
      let filtered = voices;

      if (langHint) {
        filtered = voices.filter(v => v.lang.toLowerCase().startsWith(langHint.toLowerCase()));
      }

      if (filtered.length === 0) {
        filtered = voices;
      }

      filtered.forEach((v, i) => {
        const option = document.createElement("option");
        option.value = voices.indexOf(v);
        option.textContent = `${v.name} (${v.lang})`;
        voiceSelect.appendChild(option);
      });
    }

    window.speechSynthesis.onvoiceschanged = loadVoices;
    if (window.speechSynthesis.getVoices().length) {
      loadVoices();
    }

    function detectLanguage(text) {
      const greekRegex = /[\u0370-\u03FF]/;
      const arabicRegex = /[\u0600-\u06FF]/;

      if (greekRegex.test(text)) return "el";
      if (arabicRegex.test(text)) return "ar";
      return "en";
    }

    function resizeAndPreprocessImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const maxDim = 1500;
          let { width, height } = img;

          const scale = Math.min(1, maxDim / Math.max(width, height));
          width = Math.round(width * scale);
          height = Math.round(height * scale);

          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");

          ctx.drawImage(img, 0, 0, width, height);

          const imageData = ctx.getImageData(0, 0, width, height);
          const data = imageData.data;

          for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            let v = 0.299 * r + 0.587 * g + 0.114 * b;
            v = v < 128 ? v * 0.9 : v * 1.1;
            v = Math.max(0, Math.min(255, v));
            data[i] = data[i + 1] = data[i + 2] = v;
          }

          ctx.putImageData(imageData, 0, 0);
          resolve(canvas);
        };
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }

    imageInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      currentFile = file;
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      statusEl.textContent = "Image loaded. Ready to extract text.";
    });

    extractBtn.addEventListener("click", async () => {
      if (!currentFile) {
        statusEl.textContent = "Please choose an image first.";
        return;
      }

      statusEl.textContent = "Preprocessing image…";

      try {
        const canvas = await resizeAndPreprocessImage(currentFile);
        statusEl.textContent = "Extracting text…";

        Tesseract.recognize(canvas, "eng", {
          logger: (m) => {
            if (m.status === "recognizing text") {
              statusEl.textContent = `Extracting text… ${Math.round(m.progress * 100)}%`;
            }
          },
        })
          .then(({ data: { text } }) => {
            const cleaned = text.trim();
            output.value = cleaned;
            if (!cleaned) {
              statusEl.textContent = "No readable text found. Try a clearer image.";
              return;
            }
            currentLang = detectLanguage(cleaned);
            populateVoiceSelect(currentLang);
            statusEl.textContent = "Text extracted. You can edit it before listening.";
          })
          .catch(() => {
            statusEl.textContent = "Error while extracting text.";
          });
      } catch (err) {
        statusEl.textContent = "Error processing image.";
      }
    });

    function savePodcast(text, lang) {
      const id = Date.now().toString();
      const createdAt = new Date().toISOString();
      const item = { id, text, lang, createdAt };
      podcasts.unshift(item);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(podcasts));
      renderPodcasts();
    }

    function loadPodcasts() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        podcasts = raw ? JSON.parse(raw) : [];
      } catch {
        podcasts = [];
      }
      renderPodcasts();
    }

    function renderPodcasts() {
      savedList.innerHTML = "";
      if (!podcasts.length) {
        const p = document.createElement("p");
        p.textContent = "No saved podcasts yet. Play something to save it.";
        p.style.fontSize = "0.85rem";
        p.style.color = "#6b7280";
        savedList.appendChild(p);
        return;
      }

      podcasts.forEach((p) => {
        const div = document.createElement("div");
        div.className = "saved-item";

        const meta = document.createElement("div");
        meta.className = "saved-meta";
        const date = new Date(p.createdAt);
        const langLabel = p.lang === "en" ? "English" : p.lang === "el" ? "Greek" : p.lang === "ar" ? "Arabic" : p.lang;
        meta.innerHTML = `<span>${date.toLocaleString()}</span><span>${langLabel}</span>`;

        const textPreview = document.createElement("div");
        textPreview.className = "saved-text-preview";
        textPreview.textContent = p.text.slice(0, 160) + (p.text.length > 160 ? "…" : "");

        const actions = document.createElement("div");
        actions.className = "saved-actions";

        const playBtn = document.createElement("button");
        playBtn.textContent = "Play";
        playBtn.addEventListener("click", () => {
          output.value = p.text;
          currentLang = p.lang || detectLanguage(p.text);
          populateVoiceSelect(currentLang);
          playCurrentText(true);
        });

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.style.background = "#fecaca";
        delBtn.addEventListener("click", () => {
          podcasts = podcasts.filter(x => x.id !== p.id);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(podcasts));
          renderPodcasts();
        });

        actions.appendChild(playBtn);
        actions.appendChild(delBtn);

        div.appendChild(meta);
        div.appendChild(textPreview);
        div.appendChild(actions);
        savedList.appendChild(div);
      });
    }

    function playCurrentText(fromSaved = false) {
      const text = output.value.trim();
      if (!text) {
        statusEl.textContent = "No text to read.";
        return;
      }

      if (!("speechSynthesis" in window)) {
        statusEl.textContent = "Text-to-speech is not supported in this browser.";
        return;
      }

      window.speechSynthesis.cancel();
      utterance = new SpeechSynthesisUtterance(text);

      const selectedIndex = parseInt(voiceSelect.value, 10);
      const selectedVoice = voices[selectedIndex];
      if (selectedVoice) utterance.voice = selectedVoice;

      const lang = detectLanguage(text);
      currentLang = lang;
      populateVoiceSelect(lang);

      utterance.onstart = () => {
        statusEl.textContent = "Playing audio…";
        progressFill.style.width = "0%";
      };

      utterance.onboundary = (event) => {
        if (typeof event.charIndex === "number" && text.length > 0) {
          const progress = (event.charIndex / text.length) * 100;
          progressFill.style.width = progress + "%";
          output.scrollTop = (progress / 100) * (output.scrollHeight - output.clientHeight);
        }
      };

      utterance.onend = () => {
        statusEl.textContent = "Finished.";
        progressFill.style.width = "100%";
      };

      utterance.onerror = () => {
        statusEl.textContent = "Error during playback.";
      };

      window.speechSynthesis.speak(utterance);

      if (!fromSaved) {
        savePodcast(text, lang);
      }
    }

    playBtn.addEventListener("click", () => {
      playCurrentText(false);
    });

    stopBtn.addEventListener("click", () => {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      statusEl.textContent = "Playback stopped.";
      progressFill.style.width = "0%";
    });

    loadPodcasts();
  </script>
</body>
</html>
