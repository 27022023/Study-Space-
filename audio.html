<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>NoteCast – Study Podcasts</title><meta name="viewport" content="width=device-width,initial-scale=1.0"/><style>
:root{--bg:linear-gradient(135deg,#ffe6f2,#e6f0ff);--card:#fff;--accent:#a78bfa;--soft:#c7d2fe;--soft2:#a5b4fc;--text:#111;--muted:#666;--border:#ccc;--surface:#f9fafb}
*{box-sizing:border-box}body{margin:0;padding:40px 16px;background:var(--bg);font-family:system-ui;display:flex;justify-content:center;align-items:flex-start;min-height:100vh}
.container{background:var(--card);width:100%;max-width:900px;border-radius:24px;padding:24px 22px;box-shadow:0 18px 40px rgba(0,0,0,.1)}
h1{margin:0;font-size:1.9rem;color:var(--accent)}p{margin:6px 0 16px;color:var(--muted)}
.section-title{margin:18px 0 6px;font-size:1rem;font-weight:600}
.file-label{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:999px;background:var(--soft);cursor:pointer;transition:.2s}
.file-label:hover{background:var(--soft2);transform:translateY(-1px)}
.file-label input{display:none}
.image-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.image-thumb{width:90px;height:90px;border-radius:12px;overflow:hidden;background:var(--surface);border:1px solid var(--border)}
.image-thumb img{width:100%;height:100%;object-fit:cover}
input[type=text],textarea,select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:.9rem;margin-top:6px}
textarea{min-height:160px;resize:vertical}
button{background:var(--soft);border:none;padding:9px 16px;border-radius:999px;cursor:pointer;font-size:.9rem;margin:6px 8px 0 0;transition:.2s}
button:hover{background:var(--soft2);transform:translateY(-1px)}
button.recording{background:#fecaca}
#progressBar{width:100%;height:10px;background:#eee;border-radius:999px;margin-top:12px;overflow:hidden}
#progressFill{height:100%;width:0;background:var(--accent);transition:width .1s}
audio{width:100%;margin-top:8px}
.saved-section{margin-top:20px;border-top:1px solid #eee;padding-top:14px}
.saved-item{border:1px solid var(--border);border-radius:14px;padding:10px;margin-bottom:8px;background:var(--surface)}
.saved-title{font-weight:600}
.saved-meta{font-size:.8rem;color:var(--muted);display:flex;justify-content:space-between}
.saved-actions button{margin:0;padding:6px 12px;font-size:.8rem}
.tag-pill{font-size:.75rem;background:#eee;padding:2px 8px;border-radius:999px;margin-right:4px}
</style></head><body>
<div class="container">
<header><h1>NoteCast</h1><p>Turn pictures, notes, and voice into study podcasts.</p></header>

<div><div class="section-title">Title</div><input id="titleInput" placeholder="Biology – Cells, English – Poetry..."></div>

<div><div class="section-title">Pictures</div>
<label class="file-label">Upload images<input type="file" id="imageInput" accept="image/*" multiple></label>
<div id="imageGrid" class="image-grid"></div><p id="status">No images selected.</p></div>

<div><div class="section-title">Recording</div>
<label class="file-label">Upload audio<input type="file" id="audioInput" accept="audio/*"></label>
<audio id="audioPlayer" controls style="display:none"></audio>
<p id="audioStatus" style="font-size:.8rem;color:#666"></p></div>

<div><div class="section-title">Notes</div>
<textarea id="notes" placeholder="Write or dictate notes..."></textarea>
<select id="languageSelect"><option value="auto">Detect language</option><option value="en">English</option><option value="el">Greek</option><option value="ar">Arabic</option></select>
<button id="recordBtn">🎙 Speak notes</button><p id="recordStatus" style="font-size:.8rem;color:#666"></p></div>

<div><div class="section-title">Playback</div>
<select id="voiceSelect"></select>
<div id="progressBar"><div id="progressFill"></div></div>
<button id="playBtn">Play podcast</button><button id="stopBtn">Stop</button></div>

<div class="saved-section"><h2>Saved podcasts</h2><div id="savedList"></div></div>
</div>

<script>
const $=id=>document.getElementById(id);
let images=[],audioMeta=null,voices=[],podcasts=[],utterance=null,isRecording=false;
let imagePlaceholders=[];  /* NEW: hidden placeholder storage */
const STORAGE="notecast_v3";

function loadVoices(){voices=speechSynthesis.getVoices();fillVoices()}
function fillVoices(lang){voiceSelect.innerHTML="";let v=voices;if(lang&&lang!=="auto")v=voices.filter(x=>x.lang.toLowerCase().startsWith(lang));if(!v.length)v=voices;v.forEach(x=>{let o=document.createElement("option");o.value=voices.indexOf(x);o.textContent=x.name+" ("+x.lang+")";voiceSelect.appendChild(o)})}
speechSynthesis.onvoiceschanged=loadVoices;if(speechSynthesis.getVoices().length)loadVoices();

function detectLang(t){return /[\u0370-\u03FF]/.test(t)?"el":/[\u0600-\u06FF]/.test(t)?"ar":"en"}

imageInput.onchange=e=>{
images=[...e.target.files].map(f=>({name:f.name,url:URL.createObjectURL(f)}));
imagePlaceholders=[]; /* reset hidden placeholders */
imageGrid.innerHTML="";
images.forEach((i,idx)=>{
let d=document.createElement("div");d.className="image-thumb";
let im=document.createElement("img");im.src=i.url;d.appendChild(im);imageGrid.appendChild(d);

/* NEW: store placeholder silently */
imagePlaceholders.push(`Image ${idx+1}: ${i.name} was added to your notes.`);
});
status.textContent=images.length+" image(s) selected.";
}

audioInput.onchange=e=>{
let f=e.target.files[0];if(!f){audioMeta=null;audioPlayer.style.display="none";audioStatus.textContent="No audio.";return}
audioMeta={name:f.name,url:URL.createObjectURL(f)};audioPlayer.src=audioMeta.url;audioPlayer.style.display="block";audioStatus.textContent="Loaded: "+f.name}

let rec=window.SpeechRecognition?new(window.SpeechRecognition||webkitSpeechRecognition)():null;
if(rec){rec.interimResults=true;rec.onresult=e=>{let t="";for(let r of e.results)if(r.isFinal)t+=r[0].transcript;notes.value+= (notes.value.trim()?"\n":"")+t};
rec.onend=()=>{isRecording=false;recordBtn.classList.remove("recording");recordBtn.textContent="🎙 Speak notes";recordStatus.textContent="Stopped."}}
recordBtn.onclick=()=>{
if(!rec){recordStatus.textContent="Not supported.";return}
if(!isRecording){let t=notes.value.trim(),l=languageSelect.value;if(l==="auto")l=detectLang(t);rec.lang=l+"-"+l.toUpperCase();rec.start();isRecording=true;recordBtn.classList.add("recording");recordBtn.textContent="🛑 Stop";recordStatus.textContent="Listening..."}else rec.stop()}

function save(title,text,lang,imgs,aud){
let o={id:Date.now(),title,text,lang,images:imgs,audio:aud,created:new Date().toISOString(),placeholders:imagePlaceholders};
podcasts.unshift(o);localStorage.setItem(STORAGE,JSON.stringify(podcasts));render()
}

function load(){podcasts=JSON.parse(localStorage.getItem(STORAGE)||"[]");render()}

function render(){
savedList.innerHTML="";
if(!podcasts.length){savedList.innerHTML="<p style='color:#666;font-size:.85rem'>No saved podcasts.</p>";return}
podcasts.forEach(p=>{
let d=document.createElement("div");d.className="saved-item";
d.innerHTML=`<div class="saved-title">${p.title||"(Untitled)"}</div>
<div class="saved-meta"><span>${new Date(p.created).toLocaleString()}</span><span>${p.lang}</span></div>
<div class="saved-text-preview">${p.text.slice(0,160)}${p.text.length>160?"…":""}</div>`;
let tags=document.createElement("div");tags.className="saved-tags";
if(p.images?.length){let t=document.createElement("span");t.className="tag-pill";t.textContent=p.images.length+" image(s)";tags.appendChild(t)}
if(p.audio){let t=document.createElement("span");t.className="tag-pill";t.textContent="Audio";tags.appendChild(t)}
d.appendChild(tags);
let a=document.createElement("div");a.className="saved-actions";
let loadBtn=document.createElement("button");loadBtn.textContent="Load";loadBtn.onclick=()=>{
titleInput.value=p.title;notes.value=p.text;languageSelect.value=p.lang;fillVoices(p.lang);
images=p.images||[];imagePlaceholders=p.placeholders||[];
imageGrid.innerHTML="";
images.forEach(i=>{let x=document.createElement("div");x.className="image-thumb";let im=document.createElement("img");im.src=i.url;x.appendChild(im);imageGrid.appendChild(x)});
audioMeta=p.audio||null;if(audioMeta){audioPlayer.src=audioMeta.url;audioPlayer.style.display="block"}else audioPlayer.style.display="none";
play(true)};
let del=document.createElement("button");del.textContent="Delete";del.style.background="#fecaca";del.onclick=()=>{podcasts=podcasts.filter(x=>x.id!==p.id);localStorage.setItem(STORAGE,JSON.stringify(podcasts));render()};
a.appendChild(loadBtn);a.appendChild(del);d.appendChild(a);savedList.appendChild(d)
})
}

function play(fromSaved){
let t=notes.value.trim();
let fullText=[...imagePlaceholders,t].filter(x=>x).join("\n");
if(!fullText){status.textContent="No notes.";return}
speechSynthesis.cancel();utterance=new SpeechSynthesisUtterance(fullText);
let l=languageSelect.value;if(l==="auto")l=detectLang(fullText);fillVoices(l);
let v=voices[voiceSelect.value];if(v)utterance.voice=v;
utterance.onboundary=e=>{if(e.charIndex){let p=e.charIndex/fullText.length*100;progressFill.style.width=p+"%";notes.scrollTop=p/100*(notes.scrollHeight-notes.clientHeight)}}
utterance.onend=()=>progressFill.style.width="100%";
speechSynthesis.speak(utterance);
if(!fromSaved)save(titleInput.value.trim(),t,l,images,audioMeta)
}

playBtn.onclick=()=>play(false);
stopBtn.onclick=()=>speechSynthesis.cancel();
load();
</script></body></html>
