<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NoteCast – Image to Audio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 40px 16px;
      background: linear-gradient(135deg, #ffe6f2, #e6f0ff);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      background: #ffffff;
      width: 100%;
      max-width: 700px;
      border-radius: 24px;
      padding: 24px 22px 26px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    header h1 {
      margin: 0;
      font-size: 1.9rem;
      color: #a78bfa;
    }

    header p {
      margin: 6px 0 16px;
      color: #6b7280;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: #c7d2fe;
      color: #111827;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .file-label:hover {
      background: #a5b4fc;
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(129, 140, 248, 0.4);
    }

    .file-label input {
      display: none;
    }

    #preview {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      margin-top: 14px;
      border-radius: 16px;
      display: none;
      background: #f9fafb;
    }

    #status {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #6b7280;
    }

    #extractBtn,
    #playBtn,
    #stopBtn {
      background: #c7d2fe;
      border: none;
      padding: 9px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      margin: 10px 8px 0 0;
      transition: 0.2s ease;
    }

    #extractBtn:hover,
    #playBtn:hover,
    #stopBtn:hover {
      background: #a5b4fc;
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(129, 140, 248, 0.4);
    }

    #output {
      width: 100%;
      height: 200px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      font-size: 0.9rem;
      resize: vertical;
      box-sizing: border-box;
      margin-top: 10px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    #voiceSelect {
      margin-top: 10px;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      width: 100%;
    }

    #progressBar {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      margin-top: 12px;
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: #a78bfa;
      transition: width 0.1s linear;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>NoteCast</h1>
      <p>Upload your notes and listen like a podcast.</p>
    </header>

    <label class="file-label">
      <span>Choose note image</span>
      <input type="file" id="imageInput" accept="image/*" />
    </label>

    <img id="preview" alt="Preview" />
    <p id="status">No image selected.</p>

    <button id="extractBtn">Extract Text</button>

    <textarea id="output" placeholder="Extracted text will appear here..."></textarea>

    <select id="voiceSelect"></select>

    <div id="progressBar"><div id="progressFill"></div></div>

    <button id="playBtn">Play Audio</button>
    <button id="stopBtn">Stop</button>
  </div>

  <script>
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const statusEl = document.getElementById("status");
    const output = document.getElementById("output");
    const extractBtn = document.getElementById("extractBtn");
    const playBtn = document.getElementById("playBtn");
    const stopBtn = document.getElementById("stopBtn");
    const voiceSelect = document.getElementById("voiceSelect");
    const progressFill = document.getElementById("progressFill");

    let currentFile = null;
    let utterance = null;
    let voices = [];

    function loadVoices() {
      voices = window.speechSynthesis.getVoices();
      voiceSelect.innerHTML = "";

      voices.forEach((v, i) => {
        const option = document.createElement("option");
        option.value = i;
        option.textContent = `${v.name} (${v.lang})`;
        voiceSelect.appendChild(option);
      });
    }

    window.speechSynthesis.onvoiceschanged = loadVoices;

    imageInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      currentFile = file;
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      statusEl.textContent = "Image loaded. Ready to extract text.";
    });

    extractBtn.addEventListener("click", () => {
      if (!currentFile) {
        statusEl.textContent = "Please choose an image first.";
        return;
      }

      statusEl.textContent = "Extracting text…";

      Tesseract.recognize(currentFile, "eng", {
        logger: (m) => {
          if (m.status === "recognizing text") {
            statusEl.textContent = `Extracting text… ${Math.round(m.progress * 100)}%`;
          }
        },
      })
        .then(({ data: { text } }) => {
          const cleaned = text.trim();
          output.value = cleaned;
          statusEl.textContent = cleaned
            ? "Text extracted. You can edit it before listening."
            : "No readable text found. Try a clearer image.";
        })
        .catch(() => {
          statusEl.textContent = "Error while extracting text.";
        });
    });

    playBtn.addEventListener("click", () => {
      const text = output.value.trim();
      if (!text) {
        statusEl.textContent = "No text to read.";
        return;
      }

      window.speechSynthesis.cancel();
      utterance = new SpeechSynthesisUtterance(text);

      const selectedVoice = voices[voiceSelect.value];
      if (selectedVoice) utterance.voice = selectedVoice;

      utterance.onstart = () => {
        statusEl.textContent = "Playing audio…";
        progressFill.style.width = "0%";
      };

      utterance.onboundary = (event) => {
        const progress = (event.charIndex / text.length) * 100;
        progressFill.style.width = progress + "%";

        output.scrollTop = (progress / 100) * (output.scrollHeight - output.clientHeight);
      };

      utterance.onend = () => {
        statusEl.textContent = "Finished.";
        progressFill.style.width = "100%";
      };

      window.speechSynthesis.speak(utterance);
    });

    stopBtn.addEventListener("click", () => {
      window.speechSynthesis.cancel();
      statusEl.textContent = "Playback stopped.";
      progressFill.style.width = "0%";
    });
  </script>
</body>
</html>
