<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova – Study Companion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* MENU BUTTON */
#menu-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: white;
    border: none;
    cursor: pointer;
    z-index: 9999;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
}

/* SIDEBAR (HIDDEN UNTIL OPENED) */
#sidebar {
    position: fixed;
    top: 0;
    left: -260px; /* fully hidden */
    width: 260px;
    height: 100%;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(14px);
    padding: 40px 20px;
    transition: left 0.3s ease;
    z-index: 9998;
    text-align: center;
    overflow-y: auto;
}

/* WHEN OPEN */
#sidebar.open {
    left: 0;
}

/* MENU LINKS */
#sidebar nav a {
    display: block;
    margin: 14px 0;
    padding: 10px 12px;
    text-decoration: none;
    color: #333;
    font-size: 18px;
    border-radius: 10px;
    transition: background 0.2s ease, transform 0.15s ease;
}

#sidebar nav a:hover {
    background: #e8d9ff;
    transform: translateX(6px);
}

/* CHATBOT UI */
:root{
    --bg1:#e8d9ff;
    --bg2:#d7eaff;
    --nova-bubble:#d4c4ff;
    --user-bubble:#c9f2ff;
    --text-main:#1e1e2e;
}
body{
    margin:0;
    font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--text-main);
    display:flex;
    flex-direction:column;
    height:100vh;
}
header{
    padding:10px 16px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(0,0,0,0.05);
    display:flex;
    align-items:center;
    gap:10px;
}
.nova-avatar{
    width:36px;
    height:36px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #a855f7, #6366f1);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
}
.title{
    font-weight:700;
    font-size:16px;
}
.subtitle{
    font-size:12px;
    color:#4b5563;
}
#chat{
    flex:1;
    padding:12px;
    overflow-y:auto;
}
.msg{
    max-width:80%;
    margin:6px 0;
    padding:8px 12px;
    border-radius:12px;
    font-size:14px;
    line-height:1.4;
    white-space:pre-wrap;
}
.nova{
    background:var(--nova-bubble);
    margin-right:auto;
    border-bottom-left-radius:4px;
}
.user{
    background:var(--user-bubble);
    margin-left:auto;
    border-bottom-right-radius:4px;
}
#inputBar{
    display:flex;
    padding:8px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    border-top:1px solid rgba(0,0,0,0.05);
    gap:8px;
}
#userInput{
    flex:1;
    padding:8px;
    border-radius:8px;
    border:1px solid rgba(148,163,184,0.8);
    background:rgba(255,255,255,0.8);
    color:var(--text-main);
}
#sendBtn{
    padding:8px 14px;
    border-radius:8px;
    border:none;
    background:#a855f7;
    color:white;
    font-weight:600;
    cursor:pointer;
}
#sendBtn:hover{
    background:#8b5cf6;
}
.hint{
    font-size:11px;
    color:#6b7280;
    padding:0 14px 6px;
}
</style>
</head>

<body>

<!-- LOAD MENU -->
<div id="menu-container"></div>
<script>
fetch("menu.html")
  .then(res => res.text())
  .then(html => {
    document.getElementById("menu-container").innerHTML = html;

    const menuBtn = document.getElementById("menu-btn");
    const sidebar = document.getElementById("sidebar");

    menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("open");
    });
  });
</script>

<header>
  <div class="nova-avatar">🤖</div>
  <div>
    <div class="title">Nova</div>
    <div class="subtitle">Pastel study buddy – Maths • Physics • Chemistry</div>
  </div>
</header>

<div class="hint">
  Try things like: “2x - 5 = 11”, “example physics”, “example chemistry”.
</div>

<div id="chat"></div>

<div id="inputBar">
  <input id="userInput" type="text" placeholder="Give Nova a problem..." autocomplete="off">
  <button id="sendBtn">Send</button>
</div>

<script>
/* CHATBOT LOGIC */
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

let userName = null;
let mode = "math-first";
let lastMathProblem = null;

/* EXAMPLES (10 EACH) */
const examples = {
  math: [
    { q:"Solve the equation: 2x - 5 = 11", a:"x = 8." },
    { q:"Solve the system:\n2x + y = 7\nx - y = 1", a:"x = 8/3, y = 5/3." },
    { q:"Solve the quadratic: x² - 5x + 6 = 0", a:"x = 2 or x = 3." },
    { q:"Find the derivative of f(x) = x³ - 5x + 2", a:"f'(x) = 3x² - 5." },
    { q:"Compute ∫(3x² - 4x + 1) dx", a:"x³ - 2x² + x + C." },
    { q:"Find domain of f(x)=1/(x-3)", a:"All real x except 3." },
    { q:"Probability of 2 heads in 3 tosses?", a:"3/8." },
    { q:"Solve: 4(x - 2) = 3x + 10", a:"x = 18." },
    { q:"Slope through (2,5) and (6,13)", a:"m = 2." },
    { q:"Simplify: (2x²y)(3xy³)", a:"6x³y⁴." }
  ],

  physics: [
    { q:"v=10 m/s for 8 s. Distance?", a:"80 m." },
    { q:"Car accelerates at 2 m/s² for 6 s. Velocity?", a:"12 m/s." },
    { q:"Stone thrown at 20 m/s. Max height?", a:"20 m." },
    { q:"R=10Ω, V=5V. Current?", a:"0.5 A." },
    { q:"f=50Hz, λ=2m. Speed?", a:"100 m/s." },
    { q:"3kg at 4m/s. KE?", a:"24 J." },
    { q:"2kg accelerates at 3m/s². Force?", a:"6 N." },
    { q:"5kg lifted 4m. PE?", a:"200 J." },
    { q:"120km in 2h. Speed?", a:"60 km/h." },
    { q:"Spring k=200, x=0.1m. Energy?", a:"1 J." }
  ],

  chemistry: [
    { q:"Moles in 18g H₂O?", a:"1 mol." },
    { q:"Molarity of 5g NaCl in 500mL?", a:"≈0.17 M." },
    { q:"pH of 0.01M HCl?", a:"pH = 2." },
    { q:"NH₃ + H₂O → NH₄⁺ + OH⁻: identify acid/base", a:"NH₃ base, H₂O acid." },
    { q:"Mass percent: 10g in 200g?", a:"5%." },
    { q:"Balance H₂ + O₂ → H₂O", a:"2H₂ + O₂ → 2H₂O." },
    { q:"Atoms in 2 mol C?", a:"1.204×10²⁴ atoms." },
    { q:"Moles in 44g CO₂?", a:"1 mol." },
    { q:"Oxidation state of O in H₂O₂?", a:"-1." },
    { q:"Limiting reagent: 3 mol H₂, 1 mol O₂", a:"O₂ is limiting." }
  ]
};

/* UI */
function addMessage(text, from="nova"){
  const div = document.createElement("div");
  div.className = "msg " + (from === "user" ? "user" : "nova");
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

/* Equation helpers */
function looksLikeEquation(msg){
  return msg.includes("=") && /[0-9x]/i.test(msg);
}

function solveLinearEquation(eqn){
  let s = eqn.replace(/\s+/g,"");
  const parts = s.split("=");
  if (parts.length !== 2) return null;
  const left = parts[0];
  const right = parts[1];
  const match = left.match(/([+-]?\d*)x([+-]\d+)?/i);
  if (!match) return null;
  let aStr = match[1];
  let bStr = match[2] || "+0";
  if (aStr === "" || aStr === "+") aStr = "1";
  if (aStr === "-") aStr = "-1";
  const a = parseFloat(aStr);
  const b = parseFloat(bStr);
  const c = parseFloat(right);
  if (isNaN(a) || isNaN(b) || isNaN(c) || a === 0) return null;
  const x = (c - b)/a;
  return {a,b,c,x};
}

function looksLikeArithmetic(msg){
  return /^[0-9+\-*/().\s]+$/.test(msg);
}

function safeEval(expr){
  try{
    if (!/^[0-9+\-*/().\s]+$/.test(expr)) return null;
    const f = new Function("return ("+expr+")");
    return f();
  }catch{
    return null;
  }
}

function getRandomExample(subject){
  const arr = examples[subject];
  return arr[Math.floor(Math.random()*arr.length)];
}

/* Nova brain */
function novaRespond(raw){
  const msg = raw.trim();
  const lower = msg.toLowerCase();

  if (!msg) return "Give me something to chew on — a problem, an equation, anything.";

  if (!userName && (lower.startsWith("i am ") || lower.startsWith("i'm "))){
    userName = msg.split(" ").slice(2).join(" ") || "friend";
    return `Nice to meet you, ${userName}. Give me a problem when you're ready.`;
  }
  if (!userName && lower.includes("my name is")){
    userName = msg.split(/my name is/i)[1].trim() || "friend";
    return `Nice to meet you, ${userName}. Throw me a problem when you’re ready.`;
  }

  if (lower.includes("example")){
    if (lower.includes("physics")) return formatExample("physics");
    if (lower.includes("chem")) return formatExample("chemistry");
    return formatExample("math");
  }

  if (lower.includes("math")) return formatExample("math");
  if (lower.includes("physics")) return formatExample("physics");
  if (lower.includes("chemistry")) return formatExample("chemistry");

  if (looksLikeEquation(msg)){
    const sol = solveLinearEquation(msg);
    if (sol){
      lastMathProblem = msg;
      return `Let’s solve: ${msg}\n\nx = ${sol.x}`;
    }
    return "That looks like an equation, but it’s too complex for my simple solver.";
  }

  if (looksLikeArithmetic(msg)){
    const val = safeEval(msg);
    if (val !== null){
      lastMathProblem = msg;
      return `${msg} = ${val}`;
    }
  }

  if (!isNaN(parseFloat(msg)) && lastMathProblem){
    return `If that number is your answer to “${lastMathProblem}”, tell me the full equation so I can check it.`;
  }

  return "I love that you're talking to me. Now give me something to solve — maths, physics, chemistry, anything.";
}

function formatExample(subject){
  const ex = getRandomExample(subject);
  return `${subject[0].toUpperCase()+subject.slice(1)} example:\n\nQ: ${ex.q}\nA: ${ex.a}`;
}
</script>

<script>
function handleSend(){
  const text = inputEl.value.trim();
  if (!text) return;
  addMessage(text,"user");
  inputEl.value = "";
  const reply = novaRespond(text);
  setTimeout(() => addMessage(reply,"nova"), 120);
}

sendBtn.addEventListener("click", handleSend);
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter") handleSend();
});
</script>

<script>
addMessage(
  "Hey, I’m Nova 💜🧪.\nI’m built to help with maths, physics and chemistry.\nTry giving me an equation like “2x - 5 = 11”.",
  "nova"
);
</script>

</body>
</html>
