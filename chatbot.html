<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova – Study Companion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg1:#e8d9ff;
    --bg2:#d7eaff;
    --nova-bubble:#d4c4ff;
    --user-bubble:#c9f2ff;
    --text-main:#1e1e2e;
}

body{
    margin:0;
    font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--text-main);
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    padding:14px 16px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(0,0,0,0.05);
    display:flex;
    align-items:center;
    gap:12px;
}

.nova-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #a855f7, #6366f1);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

.title{
    font-weight:700;
    font-size:18px;
}

.subtitle{
    font-size:12px;
    color:#4b5563;
}

#chat{
    flex:1;
    padding:14px;
    overflow-y:auto;
}

.msg{
    max-width:80%;
    margin:8px 0;
    padding:10px 14px;
    border-radius:12px;
    font-size:15px;
    line-height:1.45;
    white-space:pre-wrap;
}

.nova{
    background:var(--nova-bubble);
    margin-right:auto;
    border-bottom-left-radius:4px;
}

.user{
    background:var(--user-bubble);
    margin-left:auto;
    border-bottom-right-radius:4px;
}

#inputBar{
    display:flex;
    padding:10px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    border-top:1px solid rgba(0,0,0,0.05);
    gap:10px;
}

#userInput{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:1px solid rgba(148,163,184,0.8);
    background:rgba(255,255,255,0.85);
    color:var(--text-main);
    font-size:15px;
}

#sendBtn{
    padding:10px 16px;
    border-radius:8px;
    border:none;
    background:#a855f7;
    color:white;
    font-weight:600;
    cursor:pointer;
    font-size:15px;
}

#sendBtn:hover{
    background:#8b5cf6;
}

.hint{
    font-size:12px;
    color:#6b7280;
    padding:0 14px 6px;
}
</style>
</head>

<body>

<header>
  <div class="nova-avatar">🤖</div>
  <div>
    <div class="title">Nova</div>
    <div class="subtitle">Maths • Physics • Chemistry • Emotions</div>
  </div>
</header>

<div class="hint">
  Try: “2x - 5 = 11”, “x^2 - 5x + 6 = 0”, “2x+y=7\nx-y=1”, “I am sad”.
</div>

<div id="chat"></div>

<div id="inputBar">
  <input id="userInput" type="text" placeholder="Talk to Nova..." autocomplete="off">
  <button id="sendBtn">Send</button>
</div>

<script>
/* CORE CHATBOT LOGIC */
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

let userName = null;
let lastMathProblem = null;

/* EMOTION RESPONSES */
const emotionResponses = {
  sad: "I'm really sorry you're feeling sad. You deserve care and support. If you want to talk about what's making you feel this way, I'm here to listen.",
  happy: "I'm glad you're feeling happy! That’s wonderful. What made your day better?",
  angry: "It sounds like something upset you. That can be tough. If you want to talk it through, I’m here.",
  stressed: "Feeling stressed can be overwhelming. You’re not alone with that. Want to tell me what’s been weighing on you?",
  tired: "It makes sense to feel tired sometimes. I hope you can rest soon — you deserve it.",
  lonely: "Feeling lonely can be really hard. You’re not alone here. Want to talk about it?",
  anxious: "Anxiety can feel intense. You’re not doing anything wrong by feeling this way. If you want to share what’s worrying you, I’m here.",
  bored: "Boredom happens. Want a fun math or science challenge?"
};

/* FULL ORIGINAL EXAMPLES */
const examples = {
  math: [
    { q:"Solve the equation: 2x - 5 = 11", a:"x = 8." },
    { q:"Solve the system:\n2x + y = 7\nx - y = 1", a:"x = 8/3, y = 5/3." },
    { q:"Solve the quadratic: x² - 5x + 6 = 0", a:"x = 2 or x = 3." },
    { q:"Find the derivative of f(x) = x³ - 5x + 2", a:"f'(x) = 3x² - 5." },
    { q:"Compute ∫(3x² - 4x + 1) dx", a:"x³ - 2x² + x + C." },
    { q:"Find domain of f(x)=1/(x-3)", a:"All real x except 3." },
    { q:"Probability of 2 heads in 3 tosses?", a:"3/8." },
    { q:"Solve: 4(x - 2) = 3x + 10", a:"x = 18." },
    { q:"Slope through (2,5) and (6,13)", a:"m = 2." },
    { q:"Simplify: (2x²y)(3xy³)", a:"6x³y⁴." }
  ],

  physics: [
    { q:"v=10 m/s for 8 s. Distance?", a:"80 m." },
    { q:"Car accelerates at 2 m/s² for 6 s. Velocity?", a:"12 m/s." },
    { q:"Stone thrown at 20 m/s. Max height?", a:"20 m." },
    { q:"R=10Ω, V=5V. Current?", a:"0.5 A." },
    { q:"f=50Hz, λ=2m. Speed?", a:"100 m/s." },
    { q:"3kg at 4m/s. KE?", a:"24 J." },
    { q:"2kg accelerates at 3m/s². Force?", a:"6 N." },
    { q:"5kg lifted 4m. PE?", a:"200 J." },
    { q:"120km in 2h. Speed?", a:"60 km/h." },
    { q:"Spring k=200, x=0.1m. Energy?", a:"1 J." }
  ],

  chemistry: [
    { q:"Moles in 18g H₂O?", a:"1 mol." },
    { q:"Molarity of 5g NaCl in 500mL?", a:"≈0.17 M." },
    { q:"pH of 0.01M HCl?", a:"pH = 2." },
    { q:"NH₃ + H₂O → NH₄⁺ + OH⁻", a:"NH₃ is base, H₂O is acid." },
    { q:"Mass percent: 10g in 200g?", a:"5%." },
    { q:"Balance H₂ + O₂ → H₂O", a:"2H₂ + O₂ → 2H₂O." },
    { q:"Atoms in 2 mol C?", a:"1.204×10²⁴ atoms." },
    { q:"Moles in 44g CO₂?", a:"1 mol." },
    { q:"Oxidation state of O in H₂O₂?", a:"-1." },
    { q:"Limiting reagent: 3 mol H₂, 1 mol O₂", a:"O₂ is limiting." }
  ]
};

/* UI */
function addMessage(text, from="nova"){
  const div = document.createElement("div");
  div.className = "msg " + (from === "user" ? "user" : "nova");
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

/* Emotion detection */
function detectEmotion(text){
  const t = text.toLowerCase();
  if (t.includes("sad") || t.includes("down")) return "sad";
  if (t.includes("happy") || t.includes("glad")) return "happy";
  if (t.includes("angry") || t.includes("mad")) return "angry";
  if (t.includes("stress")) return "stressed";
  if (t.includes("tired")) return "tired";
  if (t.includes("lonely")) return "lonely";
  if (t.includes("anxious") || t.includes("worried")) return "anxious";
  if (t.includes("bored")) return "bored";
  return null;
}

/* QUADRATIC DETECTION */
function looksLikeQuadratic(msg){
  return msg.replace(/\s+/g,"").includes("x^2");
}

/* QUADRATIC SOLVER — STYLE C */
function solveQuadratic(eqn){
  let s = eqn.replace(/\s+/g,"").replace(/-/g,"+-");
  if (s[0] === "+") s = s.slice(1);

  const m = s.match(/([+-]?\d*)x\^2([+-]?\d*)x([+-]?\d+)=0/);
  if (!m) return null;

  let a = m[1] === "" || m[1] === "+" ? 1 : (m[1] === "-" ? -1 : parseFloat(m[1]));
  let b = m[2] === "" || m[2] === "+" ? 1 : (m[2] === "-" ? -1 : parseFloat(m[2]));
  let c = parseFloat(m[3]);

  const D = b*b - 4*a*c;

  if (D > 0){
    return {
      type:"real",
      x1:(-b + Math.sqrt(D)) / (2*a),
      x2:(-b - Math.sqrt(D)) / (2*a),
      D
    };
  }
  if (D === 0){
    return { type:"double", x:(-b)/(2*a), D };
  }
  return {
    type:"complex",
    real:(-b)/(2*a),
    imag:Math.sqrt(-D)/(2*a),
    D
  };
}

/* SYSTEM DETECTION */
function looksLikeSystem(msg){
  return msg.includes("\n") && msg.includes("x") && msg.includes("y");
}

/* SYSTEM SOLVER — STYLE C */
function solveSystem(text){
  const lines = text.split("\n").map(l => l.replace(/\s+/g,""));
  if (lines.length !== 2) return null;

  function parseEq(eq){
    const m = eq.match(/([+-]?\d*)x([+-]?\d*)y=([+-]?\d+)/);
    if (!m) return null;

    let a = m[1] === "" || m[1] === "+" ? 1 : (m[1] === "-" ? -1 : parseFloat(m[1]));
    let b = m[2] === "" || m[2] === "+" ? 1 : (m[2] === "-" ? -1 : parseFloat(m[2]));
    let c = parseFloat(m[3]);

    return {a,b,c};
  }

  const e1 = parseEq(lines[0]);
  const e2 = parseEq(lines[1]);
  if (!e1 || !e2) return null;

  const det = e1.a*e2.b - e2.a*e1.b;
  if (det === 0) return null;

  const x = (e1.c*e2.b - e2.c*e1.b) / det;
  const y = (e1.a*e2.c - e2.a*e1.c) / det;

  return {x,y};
}

/* LINEAR EQUATION DETECTION */
function looksLikeEquation(msg){
  return msg.includes("=") && msg.includes("x") && !looksLikeQuadratic(msg);
}

/* LINEAR SOLVER */
function solveLinearEquation(eqn){
  let s = eqn.replace(/\s+/g,"");
  const parts = s.split("=");
  if (parts.length !== 2) return null;

  const left = parts[0];
  const right = parts[1];

  const m = left.match(/([+-]?\d*)x([+-]?\d+)?/);
  if (!m) return null;

  let a = m[1] === "" || m[1] === "+" ? 1 : (m[1] === "-" ? -1 : parseFloat(m[1]));
  let b = m[2] ? parseFloat(m[2]) : 0;
  let c = parseFloat(right);

  if (isNaN(a) || isNaN(b) || isNaN(c)) return null;

  return { x:(c - b)/a };
}

/* ARITHMETIC */
function looksLikeArithmetic(msg){
  return /^[0-9+\-*/().\s]+$/.test(msg);
}

function safeEval(expr){
  try{
    if (!looksLikeArithmetic(expr)) return null;
    return Function("return ("+expr+")")();
  }catch{
    return null;
  }
}

/* EXAMPLE PICKER */
function getExample(subject){
  const arr = examples[subject];
  return arr[Math.floor(Math.random()*arr.length)];
}

/* MAIN BRAIN */
function novaRespond(raw){
  const msg = raw.trim();
  const lower = msg.toLowerCase();

  if (!msg) return "Give me something to chew on — a problem, an equation, anything.";

  /* Emotion */
  const emo = detectEmotion(msg);
  if (emo) return emotionResponses[emo];

  /* Name */
  if (!userName && (lower.startsWith("i am ") || lower.startsWith("i'm "))){
    userName = msg.split(" ").slice(2).join(" ") || "friend";
    return `Nice to meet you, ${userName}. Want to try a problem?`;
  }

  if (!userName && lower.includes("my name is")){
    userName = msg.split(/my name is/i)[1].trim() || "friend";
    return `Nice to meet you, ${userName}. What should we work on today?`;
  }

  /* Examples */
  if (lower.includes("example")){
    if (lower.includes("physics")) return formatExample("physics");
    if (lower.includes("chem")) return formatExample("chemistry");
    return formatExample("math");
  }

  /* Quadratic */
  if (looksLikeQuadratic(msg)){
    const sol = solveQuadratic(msg);
    if (!sol) return "I tried to read that quadratic, but something didn’t match the pattern.";

    if (sol.type === "real")
      return `Okay! Let’s solve this 💜\n\nThe discriminant is **${sol.D}**, which means we get two real roots:\n• x₁ = ${sol.x1}\n• x₂ = ${sol.x2}`;

    if (sol.type === "double")
      return `Cute! This one has a double root 💜\n\nThe discriminant is **${sol.D}**, so:\n• x = ${sol.x}`;

    return `This one has complex roots ✨\n\nThe discriminant is **${sol.D}**, so:\n• x₁ = ${sol.real} + ${sol.imag}i\n• x₂ = ${sol.real} - ${sol.imag}i`;
  }

  /* System */
  if (looksLikeSystem(msg)){
    const sol = solveSystem(msg);
    if (!sol) return "I couldn't solve that system — maybe check the format?";

    return `Let’s solve this system together 💜\n\nUsing elimination, we get:\n• x = ${sol.x}\n• y = ${sol.y}`;
  }

  /* Linear */
  if (looksLikeEquation(msg)){
    const sol = solveLinearEquation(msg);
    if (!sol) return "That looks like an equation, but I couldn’t parse it.";
    return `Let’s solve this 💜\n\n• x = ${sol.x}`;
  }

  /* Arithmetic */
  if (looksLikeArithmetic(msg)){
    const val = safeEval(msg);
    if (val !== null){
      return `Crunching the numbers… ✨\n\n${msg} = ${val}`;
    }
  }

  return "I love that you're talking to me. Want to try a maths, physics, or chemistry problem?";
}

function formatExample(subject){
  const ex = getExample(subject);
  return `${subject[0].toUpperCase()+subject.slice(1)} example:\n
